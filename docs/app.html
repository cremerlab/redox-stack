    <script>
      const pyodideWorker = new Worker("./app.js");
      pyodideWorker.busy = false
      pyodideWorker.queue = []
      
      let patching = 0
      
      function send_change(jsdoc, event) {
        if ((event.setter_id != null && event.setter_id == 'py') || (patching > 0)) {
          return
        } else if (pyodideWorker.busy && event.model && event.attr) {
          let events = []
          for (const old_event of pyodideWorker.queue) {
            if (!(old_event.model === event.model && old_event.attr === event.attr)) {
              events.push(old_event)
            }
          }
          events.push(event)
          pyodideWorker.queue = events
          return
        }
        const patch = jsdoc.create_json_patch([event])
        pyodideWorker.busy = true
        pyodideWorker.postMessage({type: 'patch', patch: patch})
      }
      
      pyodideWorker.onmessage = async (event) => {
        const msg = event.data
      
        const body = document.getElementsByTagName('body')[0]
        const loading_msgs = document.getElementsByClassName('pn-loading-msg')
        if (msg.type === 'idle') {
          if (pyodideWorker.queue.length) {
            const patch = pyodideWorker.jsdoc.create_json_patch(pyodideWorker.queue)
            pyodideWorker.busy = true
            pyodideWorker.queue = []
            pyodideWorker.postMessage({type: 'patch', patch: patch})
          } else {
            pyodideWorker.busy = false
          }
        } else if (msg.type === 'status') {
          let loading_msg
          if (loading_msgs.length) {
            loading_msg = loading_msgs[0]
          } else if (body.classList.contains('pn-loading')) {
            loading_msg = document.createElement('div')
            loading_msg.classList.add('pn-loading-msg')
            body.appendChild(loading_msg)
          }
          if (loading_msg != null) {
            loading_msg.innerHTML = msg.msg
          }
        } else if (msg.type === 'render') {
          const docs_json = JSON.parse(msg.docs_json)
          const render_items = JSON.parse(msg.render_items)
          const root_ids = JSON.parse(msg.root_ids)
      
          // Remap roots in message to element IDs
          const root_els = document.querySelectorAll('[data-root-id]')
          const data_roots = []
          for (const el of root_els) {
             el.innerHTML = ''
             data_roots.push([el.getAttribute('data-root-id'), el.id])
          }
          data_roots.sort((a, b) => a[0]<b[0] ? -1: 1)
          const roots = {}
          for (let i=0; i<data_roots.length; i++) {
            roots[root_ids[i]] = data_roots[i][1]
          }
          render_items[0]['roots'] = roots
          render_items[0]['root_ids'] = root_ids
      
          // Clear pre-rendered contents
          Bokeh.index.roots.map((v) => v.remove())
      
          // Embed content
          const [views] = await Bokeh.embed.embed_items(docs_json, render_items)
      
          // Remove loading spinner and message
          body.classList.remove("pn-loading", "arc")
          for (const loading_msg of loading_msgs) {
            loading_msg.remove()
          }
      
          // Setup bi-directional syncing
          pyodideWorker.jsdoc = jsdoc = [...views.roots.values()][0].model.document
          jsdoc.on_change(send_change.bind(null, jsdoc), false)
          pyodideWorker.postMessage({'type': 'rendered'})
          pyodideWorker.postMessage({'type': 'location', location: JSON.stringify(window.location)})
        } else if (msg.type === 'patch') {
          try {
            patching += 1
            pyodideWorker.jsdoc.apply_json_patch(msg.patch, msg.buffers)
          } finally {
            patching -= 1
          }
        }
      };
    </script>

-loading):before, .pn-loading:before {\n  background-color: #c3c3c3;\n  mask-size: auto calc(min(50%, 300px));\n  -webkit-mask-size: auto calc(min(50%, 300px));\n}",{"id":"p1014"},{"id":"p1012"},{"id":"p1013"}],"width":20,"min_width":20,"margin":[5,10],"align":"start"}}]}},{"type":"object","name":"Row","id":"p1091","attributes":{"name":"Row00208","stylesheets":["\n:host(.pn-loading):before, .pn-loading:before {\n  background-color: #c3c3c3;\n  mask-size: auto calc(min(50%, 300px));\n  -webkit-mask-size: auto calc(min(50%, 300px));\n}",{"id":"p1014"},{"id":"p1031"},{"id":"p1012"},{"id":"p1013"}],"min_width":250,"margin":[0,0,0,0],"sizing_mode":"stretch_width","align":"start","children":[{"type":"object","name":"panel.models.markup.HTML","id":"p1092","attributes":{"stylesheets":["\n:host(.pn-loading):before, .pn-loading:before {\n  background-color: #c3c3c3;\n  mask-size: auto calc(min(50%, 300px));\n  -webkit-mask-size: auto calc(min(50%, 300px));\n}",{"id":"p1014"},{"id":"p1012"},{"id":"p1013"}],"width":230,"height":18,"margin":[5,10],"sizing_mode":"fixed","align":"start","text":"&amp;lt;span style=&amp;quot;color:#2E7D32;font-weight:bold;font-size:11px&amp;quot;&amp;gt;\u2713&amp;lt;/span&amp;gt;&amp;lt;span style=&amp;quot;font-size:10px;margin-left:3px&amp;quot;&amp;gt;Acetoclastic methanogenesis&amp;lt;/span&amp;gt;","disable_math":true}},{"type":"object","name":"Checkbox","id":"p1093","attributes":{"stylesheets":["\n:host(.pn-loading):before, .pn-loading:before {\n  background-color: #c3c3c3;\n  mask-size: auto calc(min(50%, 300px));\n  -webkit-mask-size: auto calc(min(50%, 300px));\n}",{"id":"p1014"},{"id":"p1012"},{"id":"p1013"}],"width":20,"min_width":20,"margin":[5,10],"align":"start"}}]}}]}}]}}]}}]}},{"type":"object","name":"panel.models.markup.HTML","id":"p1094","attributes":{"stylesheets":["\n:host(.pn-loading):before, .pn-loading:before {\n  background-color: #c3c3c3;\n  mask-size: auto calc(min(50%, 300px));\n  -webkit-mask-size: auto calc(min(50%, 300px));\n}",{"id":"p1014"},{"id":"p1012"},{"id":"p1013"}],"min_width":0,"margin":[5,10],"sizing_mode":"stretch_width","align":"start","text":"\n&amp;lt;div style=&amp;quot;margin-top:18px;padding:12px 16px;background:#f8f9fa;border:1px solid #dee2e6;\n            border-radius:6px;font-size:11px;font-family:Georgia,serif;line-height:1.7;\n            max-width:1310px&amp;quot;&amp;gt;\n  &amp;lt;b style=&amp;quot;font-size:13px&amp;quot;&amp;gt;How condition dependence is calculated&amp;lt;/b&amp;gt;\n  &amp;lt;p style=&amp;quot;margin:6px 0&amp;quot;&amp;gt;\n    Each redox couple is characterised by its &amp;lt;b&amp;gt;standard reduction potential E\u00b0\u2032&amp;lt;/b&amp;gt; at pH 7\n    (biochemical standard state). To account for actual environmental conditions the\n    &amp;lt;b&amp;gt;Nernst equation&amp;lt;/b&amp;gt; is applied to each half-reaction:\n  &amp;lt;/p&amp;gt;\n  &amp;lt;div style=&amp;quot;background:#fff;border:1px solid #ccc;border-radius:4px;padding:6px 14px;\n              font-family:monospace;font-size:11px;margin:6px 0&amp;quot;&amp;gt;\n    E = E\u00b0\u2032 + (RT / n&amp;lt;sub&amp;gt;e&amp;lt;/sub&amp;gt;F) \u00b7 ln(Q) \u2212 (n&amp;lt;sub&amp;gt;H&amp;lt;/sub&amp;gt; / n&amp;lt;sub&amp;gt;e&amp;lt;/sub&amp;gt;) \u00b7 (RT/F) \u00b7 ln(10) \u00b7 pH\n  &amp;lt;/div&amp;gt;\n  &amp;lt;p style=&amp;quot;margin:6px 0&amp;quot;&amp;gt;\n    where &amp;lt;i&amp;gt;n&amp;lt;/i&amp;gt;&amp;lt;sub&amp;gt;e&amp;lt;/sub&amp;gt; = electrons transferred, &amp;lt;i&amp;gt;n&amp;lt;/i&amp;gt;&amp;lt;sub&amp;gt;H&amp;lt;/sub&amp;gt; = protons consumed\n    in the half-reaction, &amp;lt;i&amp;gt;Q&amp;lt;/i&amp;gt; = reaction quotient of the relevant concentrations or partial\n    pressures, &amp;lt;i&amp;gt;R&amp;lt;/i&amp;gt; = 8.314 J mol\u207b\u00b9 K\u207b\u00b9, &amp;lt;i&amp;gt;F&amp;lt;/i&amp;gt; = 96 485 C mol\u207b\u00b9, &amp;lt;i&amp;gt;T&amp;lt;/i&amp;gt; = 298 K.\n    The pH term is written out explicitly because pH is the most influential variable and this\n    form makes the dependence transparent.\n  &amp;lt;/p&amp;gt;\n  &amp;lt;p style=&amp;quot;margin:6px 0&amp;quot;&amp;gt;\n    For a complete reaction pairing a donor couple (D) with an acceptor couple (A) the free\n    energy yield is:\n  &amp;lt;/p&amp;gt;\n  &amp;lt;div style=&amp;quot;background:#fff;border:1px solid #ccc;border-radius:4px;padding:6px 14px;\n              font-family:monospace;font-size:11px;margin:6px 0&amp;quot;&amp;gt;\n    \u0394G = \u2212n&amp;lt;sub&amp;gt;e&amp;lt;/sub&amp;gt; \u00b7 F \u00b7 \u0394E &amp;amp;nbsp;&amp;amp;nbsp; where &amp;amp;nbsp;&amp;amp;nbsp; \u0394E = E&amp;lt;sub&amp;gt;A&amp;lt;/sub&amp;gt; \u2212 E&amp;lt;sub&amp;gt;D&amp;lt;/sub&amp;gt;\n  &amp;lt;/div&amp;gt;\n  &amp;lt;p style=&amp;quot;margin:6px 0&amp;quot;&amp;gt;\n    A reaction is &amp;lt;b style=&amp;quot;color:#2E7D32&amp;quot;&amp;gt;exergonic (feasible)&amp;lt;/b&amp;gt; when \u0394G &amp;amp;lt; 0, i.e. when\n    E&amp;lt;sub&amp;gt;A&amp;lt;/sub&amp;gt; &amp;amp;gt; E&amp;lt;sub&amp;gt;D&amp;lt;/sub&amp;gt; \u2014 the acceptor couple sits &amp;lt;i&amp;gt;above&amp;lt;/i&amp;gt; the donor couple on\n    the tower (remember the y-axis is inverted so more positive potentials are at the top).\n  &amp;lt;/p&amp;gt;\n\n  &amp;lt;b style=&amp;quot;font-size:12px&amp;quot;&amp;gt;Worked example \u2014 H\u207a/H\u2082 couple&amp;lt;/b&amp;gt;\n  &amp;lt;p style=&amp;quot;margin:6px 0&amp;quot;&amp;gt;\n    The half-reaction is: &amp;amp;nbsp; 2H\u207a + 2e\u207b \u2192 H\u2082 &amp;amp;nbsp; (&amp;lt;i&amp;gt;n&amp;lt;/i&amp;gt;&amp;lt;sub&amp;gt;e&amp;lt;/sub&amp;gt; = 2,\n    &amp;lt;i&amp;gt;n&amp;lt;/i&amp;gt;&amp;lt;sub&amp;gt;H&amp;lt;/sub&amp;gt; = 2, E\u00b0\u2032(pH 7) = \u2212414 mV).\n    The Nernst equation gives:\n  &amp;lt;/p&amp;gt;\n  &amp;lt;div style=&amp;quot;background:#fff;border:1px solid #ccc;border-radius:4px;padding:6px 14px;\n              font-family:monospace;font-size:11px;margin:6px 0&amp;quot;&amp;gt;\n    E(H\u207a/H\u2082) = 0 \u2212 (RT/2F) \u00b7 ln(p&amp;lt;sub&amp;gt;H\u2082&amp;lt;/sub&amp;gt;) \u2212 (RT/F) \u00b7 ln(10) \u00b7 pH\n  &amp;lt;/div&amp;gt;\n  &amp;lt;p style=&amp;quot;margin:6px 0&amp;quot;&amp;gt;\n    At pH 7 and p&amp;lt;sub&amp;gt;H\u2082&amp;lt;/sub&amp;gt; = 10\u207b\u00b3\u00b7\u2075 bar (the default, \u2248 0.3 ppm):\n    &amp;lt;b&amp;gt;E \u2248 \u2212414 mV&amp;lt;/b&amp;gt;.\n    Reducing H\u2082 to 10\u207b\u2076 bar (1 ppb) shifts E to \u2248 &amp;lt;b&amp;gt;\u2212503 mV&amp;lt;/b&amp;gt; \u2014 making H\u2082-producing\n    reactions (syntrophic oxidations) thermodynamically easier because the donor couple\n    (e.g. CO\u2082/butyrate at \u2248 \u2212280 mV) now lies &amp;lt;i&amp;gt;above&amp;lt;/i&amp;gt; H\u207a/H\u2082 on the tower,\n    so \u0394E becomes positive and \u0394G &amp;amp;lt; 0.\n    This is exactly why syntrophic bacteria require a methanogenic partner to keep H\u2082 low.\n  &amp;lt;/p&amp;gt;\n  &amp;lt;p style=&amp;quot;margin:4px 0;font-size:10px;color:#666&amp;quot;&amp;gt;\n    &amp;lt;i&amp;gt;Note on primary fermentation arrows:&amp;lt;/i&amp;gt; glucose fermentation (e.g. \u2192 butyrate, \u2192 lactate)\n    is represented using the overall net reaction \u0394G, not a direct electron transfer between two\n    couples. The CO\u2082/glucose couple serves as the donor reference; the \u0394G values shown are\n    thermodynamically correct for the net reaction but the electron path runs through internal\n    carriers (NAD\u207a/NADH, ferredoxin) rather than directly between the displayed couples.\n  &amp;lt;/p&amp;gt;\n&amp;lt;/div&amp;gt;\n","disable_math":true}}]}},{"type":"object","name":"panel.models.location.Location","id":"p1095","attributes":{"name":"location","reload":false}},{"type":"object","name":"panel.models.browser.BrowserInfo","id":"p1096","attributes":{"name":"browser_info"}}],"defs":[{"type":"model","name":"ReactiveHTML1"},{"type":"model","name":"FlexBox1","properties":[{"name":"ali
